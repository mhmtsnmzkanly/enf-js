<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ENF WebSocket Chat Demo</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#10141b; color:#e7edf5; }
    * { box-sizing:border-box; } body { margin:0; } main { max-width:1200px; margin:auto; padding:16px; }
    h1 { margin:0 0 5px; font-size:1.5rem; } p { color:#aab7c8; margin:5px 0 16px; }
    .grid { display:grid; grid-template-columns:minmax(0,2fr) minmax(270px,1fr); gap:16px; }
    .card { background:#19212c; border:1px solid #2d3b4d; border-radius:10px; padding:14px; }
    .bar, .compose, .row { display:flex; gap:8px; align-items:center; } .bar { flex-wrap:wrap; }
    label { font-size:.85rem; color:#b8c5d5; } input, textarea, button { font:inherit; border-radius:7px; border:1px solid #40516a; }
    input, textarea { color:inherit; background:#0f151e; padding:9px; } input { min-width:170px; } textarea { flex:1; min-height:58px; resize:vertical; }
    button { color:#fff; background:#2867bd; padding:9px 12px; cursor:pointer; } button:hover:not(:disabled) { background:#3478d6; } button:disabled { opacity:.5; cursor:not-allowed; }
    #status { margin-left:auto; font-size:.88rem; } .online { color:#69d08a; } .offline { color:#f0aa6b; }
    #messages { height:360px; overflow:auto; padding:6px 0; } .message { padding:9px 4px; border-bottom:1px solid #293646; white-space:pre-wrap; overflow-wrap:anywhere; }
    .message time { color:#8493a6; font-size:.78rem; margin-left:8px; } .name { color:#81b6ff; font-weight:650; }
    #typing { min-height:1.4em; color:#a8c6ec; font-size:.88rem; } ul { margin:8px 0 0; padding-left:20px; } li { overflow-wrap:anywhere; }
    pre { margin:7px 0 0; max-height:190px; overflow:auto; white-space:pre-wrap; overflow-wrap:anywhere; background:#0d131b; border:1px solid #2c394a; border-radius:7px; padding:9px; color:#c9e2ff; font:12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .protocol { margin-top:16px; } .protocol-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
    #errors { color:#ffb2a6; min-height:1.5em; white-space:pre-wrap; overflow-wrap:anywhere; } .limits { font-size:.78rem; color:#aab7c8; }
    @media (max-width:760px) { .grid,.protocol-grid { grid-template-columns:1fr; } #status { margin-left:0; } }
  </style>
</head>
<body>
  <main>
    <h1>ENF WebSocket Chat Demo</h1>
    <p>WebSocket text frame’leri içinde ENF statement’ları. Bu eğitim demosu bellekte çalışır.</p>
    <section class="card bar" aria-label="Bağlantı">
      <label for="username">Görünen ad</label><input id="username" maxlength="24" value="Mehmet" autocomplete="nickname">
      <button id="connect">Bağlan</button><button id="disconnect" disabled>Bağlantıyı kes</button>
      <span id="status" class="offline">Bağlı değil</span>
    </section>
    <div class="grid" style="margin-top:16px">
      <section class="card"><h2>Sohbet</h2><div id="messages" aria-live="polite"></div><div id="typing"></div>
        <div class="compose"><textarea id="text" placeholder="Mesaj yazın — Enter gönderir, Shift+Enter satır sonu" disabled></textarea><button id="send" disabled>Gönder</button></div>
      </section>
      <aside class="card"><h2>Aktif kullanıcılar</h2><ul id="users"></ul><hr><h3>Hatalar</h3><div id="errors" role="alert"></div>
        <p class="limits" id="limits"></p></aside>
    </div>
    <section class="card protocol"><h2>Protocol inspector</h2><p class="limits">`format()` yalnızca başarılı parse edilmiş ENF belgeleri için çağrılır.</p>
      <div class="protocol-grid"><div><label>Son gönderilen raw frame</label><pre id="sent">—</pre></div><div><label>Son alınan raw frame</label><pre id="received">—</pre></div><div><label>Formatlanmış ENF</label><pre id="formatted">—</pre></div></div>
    </section>
  </main>
  <script type="module">
    // The version and dist path were checked against the published package. ENF
    // comments are not inserted into frames; explanation belongs in JS/HTML.
    import { parse, tryParse, stringify, format, DEFAULT_LIMITS, ENFSyntaxError, ENFTypeError, ENFLimitError } from 'https://cdn.jsdelivr.net/npm/@mhmtsnmzkanly/enf-js@1.0.0/dist/index.min.js';

    const CHAT_LIMITS = { ...DEFAULT_LIMITS, maxSourceLength: 64 * 1024, maxStatements: 16, maxDepth: 12, maxArrayLength: 100, maxObjectEntries: 32, maxStringLength: 4_096 };
    const $ = (id) => document.getElementById(id);
    const elements = Object.fromEntries(['username','connect','disconnect','status','messages','typing','text','send','users','errors','limits','sent','received','formatted'].map((id) => [id, $(id)]));
    let ws = null;
    let ready = false;
    let typing = false;
    let typingTimer = null;
    let lastTypingSent = 0;
    const typingUsers = new Set();

    elements.limits.textContent = `ENF varsayılan limitleri: kaynak ${DEFAULT_LIMITS.maxSourceLength.toLocaleString()} karakter, statement ${DEFAULT_LIMITS.maxStatements.toLocaleString()}, derinlik ${DEFAULT_LIMITS.maxDepth}, string ${DEFAULT_LIMITS.maxStringLength.toLocaleString()}. Demo parser limiti: 64 KiB / 16 statement / 4.096 karakter.`;
    function setStatus(text, connected) { elements.status.textContent = text; elements.status.className = connected ? 'online' : 'offline'; }
    function setControls() { const open = ws?.readyState === WebSocket.OPEN; elements.connect.disabled = open || ws?.readyState === WebSocket.CONNECTING; elements.disconnect.disabled = !open; elements.text.disabled = !ready; elements.send.disabled = !ready; }
    function report(text) { elements.errors.textContent = text; }
    function showFormatted(raw) {
      // format() parses internally, so invoke it after tryParse()/parse success only.
      try { elements.formatted.textContent = format(raw, CHAT_LIMITS); } catch { elements.formatted.textContent = 'Formatlanamadı.'; }
    }
    function sendEvents(events) {
      if (ws?.readyState !== WebSocket.OPEN) return report('WebSocket açık değil.');
      try {
        // stringify() guarantees ENF escaping and mandatory semicolons; never hand-build protocol strings from text input.
        const raw = stringify(events);
        elements.sent.textContent = raw; showFormatted(raw);
        ws.send(raw);
      } catch (error) { report(`Gönderim ENF hatası: ${error.code || error.message}`); }
    }
    function appendMessage(message) {
      const row = document.createElement('div'); row.className = 'message';
      const name = document.createElement('span'); name.className = 'name'; name.textContent = message.username;
      const body = document.createElement('span'); body.textContent = `: ${message.text}`;
      const time = document.createElement('time'); time.textContent = new Date(message.created_at).toLocaleTimeString();
      // textContent rather than innerHTML means chat text can never become markup.
      row.append(name, body, time); elements.messages.append(row); elements.messages.scrollTop = elements.messages.scrollHeight;
    }
    function renderUsers(users) { elements.users.replaceChildren(...users.map((user) => { const li = document.createElement('li'); li.textContent = user; return li; })); }
    function renderTyping() { elements.typing.textContent = [...typingUsers].length ? `${[...typingUsers].join(', ')} yazıyor…` : ''; }
    function handleEvent(event) {
      switch (event.name) {
        case 'session.ready': ready = true; setStatus(`${event.value.username} olarak bağlı`, true); setControls(); break;
        case 'presence.list': renderUsers(event.value.users); break;
        case 'presence.joined': sendEvents([{ name: 'presence.list.request' }]); break;
        case 'presence.left': typingUsers.delete(event.value.username); renderTyping(); sendEvents([{ name: 'presence.list.request' }]); break;
        case 'chat.history': elements.messages.replaceChildren(); event.value.messages.forEach(appendMessage); break;
        case 'chat.message.created': appendMessage(event.value); break;
        case 'chat.typing.changed': event.value.typing ? typingUsers.add(event.value.username) : typingUsers.delete(event.value.username); renderTyping(); break;
        case 'system.pong': report(`Pong: sunucu zamanı ${new Date(event.value.server_time).toLocaleTimeString()}`); break;
        case 'system.error': report(`${event.value.code}: ${event.value.message}${event.value.details?.enf_code ? ` (${event.value.details.enf_code})` : ''}`); break;
        case 'system.notice': report(event.value.message); break;
      }
    }
    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
      const username = elements.username.value.trim();
      if (!username) return report('Görünen ad gerekli.');
      ready = false; setStatus('Bağlanıyor…', false); setControls(); report('');
      ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
      ws.addEventListener('open', () => { setControls(); sendEvents([{ name: 'client.hello', value: { username, client_version: '1.0.0' } }, { name: 'system.ping', value: { timestamp: Date.now() } }]); });
      ws.addEventListener('message', (event) => {
        if (typeof event.data !== 'string') return report('Sunucu binary frame gönderdi; demo bunu reddeder.');
        elements.received.textContent = event.data;
        // Untrusted server text also goes through tryParse. A valid frame can
        // contain many ordered statements, all dispatched below.
        const result = tryParse(event.data, CHAT_LIMITS);
        if (!result.ok) { const kind = result.error instanceof ENFSyntaxError ? 'Syntax' : result.error instanceof ENFLimitError ? 'Limit' : result.error instanceof ENFTypeError ? 'Type' : 'ENF'; return report(`${kind} hatası: ${result.error.code}`); }
        showFormatted(event.data);
        for (const protocolEvent of result.value) handleEvent(protocolEvent);
      });
      ws.addEventListener('close', () => { ready = false; typing = false; typingUsers.clear(); renderTyping(); setStatus('Bağlı değil', false); setControls(); });
      ws.addEventListener('error', () => report('WebSocket hatası oluştu. Sunucunun çalıştığını kontrol edin.'));
    }
    function disconnect() { if (ws) ws.close(1000, 'Manual disconnect'); }
    function sendMessage() { const text = elements.text.value; if (!text.trim()) return; sendEvents([{ name: 'chat.message.send', value: { text, reply_to: null } }]); elements.text.value = ''; stopTyping(); }
    function startTyping() { if (!ready || typing || Date.now() - lastTypingSent < 300) return; typing = true; lastTypingSent = Date.now(); sendEvents([{ name: 'chat.typing.start' }]); }
    function stopTyping() { clearTimeout(typingTimer); if (!typing) return; typing = false; sendEvents([{ name: 'chat.typing.stop' }]); }
    elements.connect.addEventListener('click', connect); elements.disconnect.addEventListener('click', disconnect); elements.send.addEventListener('click', sendMessage);
    elements.text.addEventListener('keydown', (event) => { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); } });
    elements.text.addEventListener('input', () => { startTyping(); clearTimeout(typingTimer); typingTimer = setTimeout(stopTyping, 700); });
  </script>
</body>
</html>
